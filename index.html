<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Route Map</title>
  <style>
    :root {
      --page: #d8e7ef;
      --line: #18a999;
      --line-active: #8b5cf6;
      --marker: #fff5a8;
      --marker-active: #9d4edd;
      --ink: #18313d;
      --muted: #587382;
      --panel: rgba(255, 255, 255, 0.84);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page);
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--page);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .map-bg {
      pointer-events: none;
      user-select: none;
    }

    .route {
      fill: none;
      stroke: var(--line);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 22 18;
      opacity: 0.64;
      filter: drop-shadow(0 2px 2px rgba(15, 70, 80, 0.22));
      transition: opacity 0.2s ease, stroke 0.2s ease, stroke-width 0.2s ease, stroke-dasharray 0.2s ease;
    }

    .route.active {
      stroke: var(--line-active);
      stroke-width: 11;
      stroke-dasharray: none;
      opacity: 0.95;
    }

    .route.pending {
      opacity: 0;
      pointer-events: none;
    }

    .plane-path {
      fill: none;
      stroke: transparent;
      stroke-width: 1;
    }

    .marker-ring {
      fill: rgba(255, 255, 255, 0.22);
      stroke: rgba(20, 60, 72, 0.45);
      stroke-width: 3;
    }

    .marker-dot {
      fill: var(--marker);
      stroke: #243d48;
      stroke-width: 3;
    }

    .marker.active .marker-ring {
      stroke: var(--marker-active);
      stroke-width: 6;
    }

    .marker.active .marker-dot {
      fill: var(--marker-active);
    }

    .marker.intro-flash .marker-ring {
      animation: markerPulse 0.8s ease-in-out 3;
    }

    .marker.intro-flash .marker-dot {
      animation: dotPulse 0.8s ease-in-out 3;
    }

    @keyframes markerPulse {
      0%, 100% { stroke: rgba(20, 60, 72, 0.45); stroke-width: 3; opacity: 0.75; }
      50% { stroke: var(--marker-active); stroke-width: 12; opacity: 1; }
    }

    @keyframes dotPulse {
      0%, 100% { fill: var(--marker); }
      50% { fill: var(--marker-active); }
    }

    .city-label {
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 6;
      stroke-linejoin: round;
      fill: #14313e;
      font-size: 34px;
      font-weight: 700;
      pointer-events: none;
    }

    .plane {
      filter: drop-shadow(0 8px 8px rgba(18, 45, 56, 0.34));
      pointer-events: none;
    }

    .info-card {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 4;
      width: min(420px, calc(100vw - 36px));
      padding: 14px 16px 15px;
      border: 1px solid rgba(53, 84, 98, 0.25);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(36, 69, 84, 0.2);
      backdrop-filter: blur(8px);
    }

    .date {
      font-size: clamp(16px, 2.1vw, 24px);
      font-weight: 800;
      line-height: 1.05;
    }

    .airport {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .items {
      margin-top: 9px;
      font-size: clamp(14px, 1.8vw, 18px);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .route-line {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 4;
      max-width: min(620px, calc(100vw - 36px));
      padding: 10px 12px;
      border: 1px solid rgba(53, 84, 98, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: #244554;
      font-size: 13px;
      line-height: 1.45;
      box-shadow: 0 8px 18px rgba(36, 69, 84, 0.16);
      backdrop-filter: blur(8px);
    }

    .photo-frame {
      position: absolute;
      left: 50%;
      bottom: 18px;
      z-index: 5;
      display: none;
      width: min(420px, 42vw);
      max-height: 30vh;
      transform: translateX(-50%);
      border: 8px solid rgba(255, 255, 255, 0.86);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 15px 34px rgba(26, 55, 68, 0.3);
    }

    .photo-frame img {
      display: block;
      width: 100%;
      max-height: calc(30vh - 16px);
      object-fit: cover;
    }

    @media (max-width: 720px) {
      .info-card {
        top: 10px;
        right: 10px;
        width: calc(100vw - 20px);
        padding: 11px 12px;
      }

      .route-line {
        left: 10px;
        top: auto;
        bottom: 10px;
        max-width: calc(100vw - 20px);
        font-size: 12px;
      }

      .photo-frame {
        width: min(330px, 76vw);
        bottom: 84px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <aside class="info-card" aria-live="polite">
      <div class="date" id="dateText">--</div>
      <div class="airport" id="airportText">--</div>
      <div class="items" id="itemsText">--</div>
    </aside>

    <div class="photo-frame" id="photoFrame">
      <img id="photoImage" alt="" />
    </div>

    <div class="route-line" id="routeLine"></div>

    <svg id="map" viewBox="0 0 3626 2254" preserveAspectRatio="xMidYMid slice" aria-label="flight route map">
      <image class="map-bg" href="pic/world.png" x="0" y="0" width="3626" height="2254"></image>
      <path id="planePath" class="plane-path"></path>
      <g id="routeLayer"></g>
      <g id="markerLayer"></g>
      <g id="planeLayer"></g>
    </svg>
  </main>

  <script>
    const STOPS = [
      { sequence: "A1", airport_code: "SEA", city: "Seattle", latitude: 47.45, longitude: -122.31, date: "2025-07-04", items: "君士坦丁堡，我们来了", pic: "" },
      { sequence: "A2", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-07-11", items: "卡帕多细亚的奇幻地貌，彩色的热气球", pic: "CAPA" },
      { sequence: "A3", airport_code: "NAV", city: "Nevsehir", latitude: 38.77, longitude: 34.53, date: "2025-07-21", items: "格鲁吉亚的高加索风光、前苏联遗迹和高山", pic: "TBS" },
      { sequence: "A4", airport_code: "TBS", city: "Tbilisi", latitude: 41.67, longitude: 44.95, date: "2025-07-23", items: "回到IST转机", pic: "" },
      { sequence: "A5", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-07-28", items: "第一次去非洲、古老、炎热、沙漠、金字塔、尼罗河，一串串从小在各种故事中见过的，一一呈现", pic: "CAI" },
      { sequence: "A6", airport_code: "CAI", city: "Cairo", latitude: 30.12, longitude: 31.41, date: "2025-07-29", items: "再次回IST，半夜IHG", pic: "" },
      { sequence: "A7", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-07-30", items: "新加坡转机，短暂停留", pic: "" },
      { sequence: "A8", airport_code: "SIN", city: "Singapore", latitude: 1.36, longitude: 103.99, date: "2025-07-31", items: "第一次去大洋洲，漂亮的墨尔本，远超预期", pic: "MEL" },
      { sequence: "A9", airport_code: "MEL", city: "Melbourne", latitude: -37.67, longitude: 144.84, date: "2025-08-01", items: "久负盛名的歌剧院和悉尼大桥", pic: "SYD" },
      { sequence: "A10", airport_code: "SYD", city: "Sydney", latitude: -33.95, longitude: 151.18, date: "2025-08-04", items: "又来到HK，炎热、繁华", pic: "" },
      { sequence: "A11", airport_code: "HKG", city: "Hong Kong", latitude: 22.31, longitude: 113.92, date: "2025-08-07", items: "绍兴，江南", pic: "" },
      { sequence: "A12", airport_code: "HGH", city: "Hangzhou", latitude: 30.23, longitude: 120.43, date: "2025-08-09", items: "SH", pic: "" },
      { sequence: "A13", airport_code: "SHA", city: "Shanghai", latitude: 31.2, longitude: 121.34, date: "2025-08-15", items: "香港转机", pic: "" },
      { sequence: "A14", airport_code: "HKG", city: "Hong Kong", latitude: 22.31, longitude: 113.92, date: "2025-08-19", items: "雅加达，热闹、拥堵", pic: "" },
      { sequence: "A15", airport_code: "CGK", city: "Jakarta", latitude: -6.13, longitude: 106.66, date: "2025-08-20", items: "多哈，中东的热", pic: "DOH" },
      { sequence: "A16", airport_code: "DOH", city: "Doha", latitude: 25.26, longitude: 51.61, date: "2025-08-21", items: "Section 1， Gotta！", pic: "" },
      { sequence: "A17", airport_code: "SEA", city: "Seattle", latitude: 47.45, longitude: -122.31, date: "2025-08-22", items: "", pic: "" },
      { sequence: "B1", airport_code: "SEA", city: "Seattle", latitude: 47.45, longitude: -122.31, date: "2025-09-27", items: "出发，第五次去伊斯坦布尔", pic: "IST" },
      { sequence: "B2", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-09-28", items: "出发去迪拜，参观哈里发塔", pic: "DXB" },
      { sequence: "B3", airport_code: "DXB", city: "Dubai", latitude: 25.25, longitude: 55.36, date: "2025-10-02", items: "再次回到博斯普鲁斯海峡旁边", pic: "" },
      { sequence: "B4", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-10-05", items: "今天去大都会博物馆", pic: "" },
      { sequence: "B5", airport_code: "JFK", city: "New York", latitude: 40.64, longitude: -73.78, date: "2025-10-06", items: "第七次去伊斯坦布尔", pic: "IST2" },
      { sequence: "B6", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-10-07", items: "贝尔格莱德，蓝色多瑙河畔的城堡", pic: "" },
      { sequence: "B7", airport_code: "BEG", city: "Belgrade", latitude: 44.82, longitude: 20.31, date: "2025-10-09", items: "第8次，住在Tacsim", pic: "" },
      { sequence: "B8", airport_code: "IST", city: "Istanbul", latitude: 41.27, longitude: 28.75, date: "2025-10-10", items: "第一次去南美，波哥大高原之城，或许因为疲劳，竟然有些高反", pic: "" },
      { sequence: "B9", airport_code: "BOG", city: "Bogota", latitude: -4.36, longitude: -74.04, date: "2025-10-11", items: "亚特兰大，1996奥林匹克和可口可乐", pic: "" },
      { sequence: "B10", airport_code: "ATL", city: "Atlanta", latitude: 37.75, longitude: -84.39, date: "2025-10-12", items: "Got！ Billionaire //", pic: "" },
      { sequence: "B11", airport_code: "SEA", city: "Seattle", latitude: 47.45, longitude: -122.31, date: "2025-10-13", items: "", pic: "" }
    ];

    const AIRPORT_PIXEL_POSITIONS = {
      SEA: { x: 718.8, y: 480.4 },
      JFK: { x: 1064.6, y: 601.5 },
      ATL: { x: 954.9, y: 691.5 },
      BOG: { x: 984.0, y: 1065.6 },
      DXB: { x: 2218.5, y: 810.3 },
      IST: { x: 1965.6, y: 620.1 },
      BEG: { x: 1886.8, y: 581.1 },
      NAV: { x: 2040.8, y: 641.4 },
      TBS: { x: 2089.4, y: 612.7 },
      CAI: { x: 1985.6, y: 747.9 },
      DOH: { x: 2183.6, y: 808.3 },
      SIN: { x: 2719.4, y: 1103.7 },
      CGK: { x: 2760.0, y: 1202.3 },
      HKG: { x: 2792.0, y: 822.0 },
      HGH: { x: 2818.1, y: 729.3 },
      SHA: { x: 2822.0, y: 696.0 },
      MEL: { x: 2944.7, y: 1567.6 },
      SYD: { x: 3041.5, y: 1589.5 }
    };

    const mapSvg = document.getElementById("map");
    const routeLayer = document.getElementById("routeLayer");
    const markerLayer = document.getElementById("markerLayer");
    const planeLayer = document.getElementById("planeLayer");
    const planePath = document.getElementById("planePath");
    const dateText = document.getElementById("dateText");
    const airportText = document.getElementById("airportText");
    const itemsText = document.getElementById("itemsText");
    const routeLine = document.getElementById("routeLine");
    const photoFrame = document.getElementById("photoFrame");
    const photoImage = document.getElementById("photoImage");
    const NS = "http://www.w3.org/2000/svg";
    const LEG_DURATION_MS = 3000;
    const INTRO_FLASH_MS = 2400;
    const FULL_VIEWBOX = "0 0 3626 2254";
    const MAP_WIDTH = 3626;
    const MAP_HEIGHT = 2254;
    const ZOOM_REGIONS = [
      { x: 1570, y: 410, width: 960, height: 600 },
      { x: 2550, y: 610, width: 520, height: 360 }
    ];
    const MOBILE_FOLLOW_HEIGHT = 1260;

    const createEl = (name, attrs = {}) => {
      const el = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    };

    const getPosition = (stop) => AIRPORT_PIXEL_POSITIONS[stop.airport_code];

    const curvedPath = (from, to) => {
      const a = getPosition(from);
      const b = getPosition(to);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const distance = Math.hypot(dx, dy);
      const lift = Math.min(190, Math.max(58, distance * 0.14));
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      const nx = -dy / (distance || 1);
      const ny = dx / (distance || 1);
      const c1 = { x: mx + nx * lift, y: my + ny * lift };
      return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
    };

    const straightPath = (from, to) => {
      const a = getPosition(from);
      const b = getPosition(to);
      return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} L ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
    };

    const isSamePlace = (from, to) => from.airport_code === to.airport_code;
    const isGroundLeg = (from, to) => (
      (from.airport_code === "HGH" && to.airport_code === "SHA") ||
      (from.airport_code === "SHA" && to.airport_code === "HGH")
    );

    const routeLegs = STOPS.slice(0, -1).map((from, index) => ({
      from,
      to: STOPS[index + 1],
      fromIndex: index,
      toIndex: index + 1,
      isGround: isGroundLeg(from, STOPS[index + 1])
    })).filter((leg) => !isSamePlace(leg.from, leg.to));
    const flightLegs = routeLegs.filter((leg) => !leg.isGround);

    const routeNodes = [];
    const markerNodes = {};
    let planeMover = null;
    let lastActiveStopIndex = -1;
    let lastActiveLegIndex = -1;
    let activeViewBox = FULL_VIEWBOX;
    let currentCycle = -1;

    const updatePhoto = (pic) => {
      if (!pic) {
        photoFrame.style.display = "none";
        photoImage.removeAttribute("src");
        return;
      }

      const candidates = /\.[a-z0-9]+$/i.test(pic)
        ? [`pic/${pic}`]
        : [`pic/${pic}.jpg`, `pic/${pic}.png`, `pic/${pic}.jpeg`];
      let index = 0;

      photoImage.onerror = () => {
        index += 1;
        if (index < candidates.length) {
          photoImage.src = candidates[index];
        } else {
          photoFrame.style.display = "none";
          photoImage.removeAttribute("src");
        }
      };

      photoImage.onload = () => {
        photoFrame.style.display = "block";
      };

      photoImage.src = candidates[index];
    };

    const setActiveStop = (stopIndex, activeLegIndex = -1) => {
      if (stopIndex === lastActiveStopIndex && activeLegIndex === lastActiveLegIndex) return;
      lastActiveStopIndex = stopIndex;
      lastActiveLegIndex = activeLegIndex;

      const stop = STOPS[stopIndex] || STOPS[0];
      dateText.textContent = stop.date || "--";
      airportText.textContent = `${stop.sequence}  ${stop.airport_code}${stop.city ? ` · ${stop.city}` : ""}`;
      itemsText.textContent = stop.items || "";
      updatePhoto(stop.pic);

      Object.values(markerNodes).forEach((node) => node.classList.remove("active"));
      if (markerNodes[stop.airport_code]) markerNodes[stop.airport_code].classList.add("active");

      routeNodes.forEach((node) => {
        const legIndex = Number(node.getAttribute("data-leg-index"));
        node.classList.toggle("active", legIndex === activeLegIndex);
        node.classList.toggle("pending", activeLegIndex < 0 || legIndex > activeLegIndex);
      });
    };

    const flashAllMarkers = () => {
      Object.values(markerNodes).forEach((node) => {
        node.classList.remove("intro-flash");
      });
      void markerLayer.getBoundingClientRect();
      Object.values(markerNodes).forEach((node) => {
        node.classList.add("intro-flash");
      });
    };

    const beginIntroCycle = () => {
      if (planeMover) planeMover.style.display = "none";
      activeViewBox = FULL_VIEWBOX;
      mapSvg.setAttribute("viewBox", FULL_VIEWBOX);
      setActiveStop(0, -1);
      flashAllMarkers();
    };

    const updateMapView = (point) => {
      const isPortraitPhone = window.matchMedia("(max-width: 720px) and (orientation: portrait)").matches;
      if (isPortraitPhone) {
        const ratio = window.innerWidth / Math.max(1, window.innerHeight);
        const height = MOBILE_FOLLOW_HEIGHT;
        const width = height * ratio;
        const x = Math.max(0, Math.min(MAP_WIDTH - width, point.x - width / 2));
        const y = Math.max(0, Math.min(MAP_HEIGHT - height, point.y - height / 2));
        const nextViewBox = `${x.toFixed(1)} ${y.toFixed(1)} ${width.toFixed(1)} ${height.toFixed(1)}`;

        if (nextViewBox === activeViewBox) return;
        activeViewBox = nextViewBox;
        mapSvg.setAttribute("viewBox", activeViewBox);
        return;
      }

      const region = ZOOM_REGIONS.find((item) => (
        point.x >= item.x &&
        point.x <= item.x + item.width &&
        point.y >= item.y &&
        point.y <= item.y + item.height
      ));
      const nextViewBox = region
        ? `${region.x} ${region.y} ${region.width} ${region.height}`
        : FULL_VIEWBOX;

      if (nextViewBox === activeViewBox) return;
      activeViewBox = nextViewBox;
      mapSvg.setAttribute("viewBox", activeViewBox);
    };

    const drawRoutes = () => {
      routeLegs.forEach((leg, index) => {
        const path = createEl("path", {
          class: "route",
          d: leg.isGround ? straightPath(leg.from, leg.to) : curvedPath(leg.from, leg.to),
          "data-leg-index": index,
          "data-from-index": leg.fromIndex,
          "data-to-index": leg.toIndex
        });

        path.addEventListener("mouseenter", () => setActiveStop(leg.toIndex, index));
        routeLayer.appendChild(path);
        routeNodes.push(path);
      });
    };

    const drawMarkers = () => {
      const seen = new Set();
      STOPS.forEach((stop) => {
        if (seen.has(stop.airport_code)) return;
        seen.add(stop.airport_code);

        const p = getPosition(stop);
        const g = createEl("g", { class: "marker", "data-code": stop.airport_code });
        const ring = createEl("circle", { class: "marker-ring", cx: p.x, cy: p.y, r: 21 });
        const dot = createEl("circle", { class: "marker-dot", cx: p.x, cy: p.y, r: 9 });
        const label = createEl("text", { class: "city-label", x: p.x + 24, y: p.y - 20 });
        label.textContent = stop.airport_code;

        g.appendChild(ring);
        g.appendChild(dot);
        g.appendChild(label);
        g.addEventListener("click", () => setActiveStop(STOPS.findIndex((item) => item.airport_code === stop.airport_code)));
        markerLayer.appendChild(g);
        markerNodes[stop.airport_code] = g;
      });
    };

    const drawPlane = () => {
      const fullPath = flightLegs.map((leg, index) => curvedPath(leg.from, leg.to).replace(index === 0 ? "" : /^M [^Q]+ /, "")).join(" ");
      planePath.setAttribute("d", fullPath);

      planeMover = createEl("g");
      const plane = createEl("image", {
        href: "pic/air-plane-transparent.png",
        x: -42,
        y: -42,
        width: 84,
        height: 84,
        class: "plane"
      });
      planeMover.appendChild(plane);
      planeLayer.appendChild(planeMover);
    };

    const updateByTime = (start) => {
      const flightDuration = flightLegs.length * LEG_DURATION_MS;
      const cycleDuration = INTRO_FLASH_MS + flightDuration;
      const totalElapsed = performance.now() - start;
      const cycle = Math.floor(totalElapsed / cycleDuration);
      const elapsed = totalElapsed % cycleDuration;

      if (cycle !== currentCycle) {
        currentCycle = cycle;
        beginIntroCycle();
      }

      if (elapsed < INTRO_FLASH_MS) {
        requestAnimationFrame(() => updateByTime(start));
        return;
      }

      if (planeMover) planeMover.style.display = "block";
      const flightElapsed = elapsed - INTRO_FLASH_MS;
      const flightIndex = Math.min(flightLegs.length - 1, Math.floor(flightElapsed / LEG_DURATION_MS));
      const leg = flightLegs[flightIndex];
      const routeIndex = routeLegs.indexOf(leg);
      const localProgress = (flightElapsed % LEG_DURATION_MS) / LEG_DURATION_MS;
      const path = routeNodes[routeIndex];
      const pathLength = path.getTotalLength();
      const distance = pathLength * localProgress;
      const p = path.getPointAtLength(distance);
      const before = path.getPointAtLength(Math.max(0, distance - 2));
      const after = path.getPointAtLength(Math.min(pathLength, distance + 2));
      const angle = Math.atan2(after.y - before.y, after.x - before.x) * 180 / Math.PI;
      const activeIndex = localProgress < 0.5 ? leg.fromIndex : leg.toIndex;
      if (planeMover) {
        planeMover.setAttribute("transform", `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)}) rotate(${(angle + 90).toFixed(1)})`);
      }
      updateMapView(p);
      setActiveStop(activeIndex, routeIndex);
      requestAnimationFrame(() => updateByTime(start));
    };

    routeLine.textContent = STOPS.map((stop) => stop.airport_code).join(" → ");
    drawRoutes();
    drawMarkers();
    drawPlane();
    setActiveStop(0, -1);
    requestAnimationFrame(() => updateByTime(performance.now()));
  </script>
</body>
</html>
