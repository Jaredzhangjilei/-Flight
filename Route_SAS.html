<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAS Flight Route Map</title>
  <style>
    :root {
      --page: #d8e7ef;
      --line: #00a3ff;
      --line-active: #31d158;
      --marker: #f7ffe9;
      --marker-active: #39d353;
      --ink: #18313d;
      --muted: #587382;
      --panel: rgba(255, 255, 255, 0.84);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page);
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--page);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .map-bg,
    .country-layer {
      pointer-events: none;
      user-select: none;
    }

    .ocean-bg {
      fill: #7faeae;
    }

    .country {
      fill: #f7f7f1;
      stroke: #1d2428;
      stroke-width: 1.2;
      vector-effect: non-scaling-stroke;
    }

    .route {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      filter: drop-shadow(0 2px 2px rgba(15, 70, 80, 0.28));
      transition: opacity 0.22s ease, stroke 0.22s ease, stroke-width 0.22s ease;
    }

    .route.flown {
      stroke: #1686d9;
      stroke-width: 1.2;
      stroke-dasharray: 4 3;
      opacity: 0.72;
    }

    .route.active {
      stroke: var(--line-active);
      stroke-width: 2.6;
      stroke-dasharray: none;
      opacity: 0.92;
    }

    .route.hidden-route {
      opacity: 0 !important;
    }

    .plane-path {
      fill: none;
      stroke: transparent;
      stroke-width: 1;
    }

    .marker-ring {
      fill: rgba(255, 255, 255, 0.24);
      stroke: rgba(20, 60, 72, 0.46);
      stroke-width: 3;
    }

    .marker-dot {
      fill: var(--marker);
      stroke: #243d48;
      stroke-width: 3;
    }

    .marker.active .marker-ring {
      stroke: var(--marker-active);
      stroke-width: 6;
    }

    .marker.active .marker-dot {
      fill: var(--marker-active);
    }

    .marker.intro-flash .marker-ring {
      animation: markerPulse 0.82s ease-in-out 3;
    }

    .marker.intro-flash .marker-dot {
      animation: dotPulse 0.82s ease-in-out 3;
    }

    @keyframes markerPulse {
      0%, 100% { stroke: rgba(20, 60, 72, 0.46); stroke-width: 3; opacity: 0.78; }
      50% { stroke: var(--marker-active); stroke-width: 14; opacity: 1; }
    }

    @keyframes dotPulse {
      0%, 100% { fill: var(--marker); }
      50% { fill: var(--marker-active); }
    }

    .city-label {
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.92);
      stroke-width: 6;
      stroke-linejoin: round;
      fill: #14313e;
      font-size: 31px;
      font-weight: 800;
      pointer-events: none;
    }

    .plane {
      filter: drop-shadow(0 9px 9px rgba(18, 45, 56, 0.42));
      pointer-events: none;
    }

    .plane-label-bg {
      fill: rgba(255, 255, 255, 0.86);
      stroke: rgba(31, 93, 57, 0.25);
      stroke-width: 1.5;
      filter: drop-shadow(0 6px 9px rgba(18, 45, 56, 0.22));
      pointer-events: none;
    }

    .plane-label-text {
      fill: #1f5d39;
      font-size: 28px;
      font-weight: 900;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.82);
      stroke-width: 5;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .info-card {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 4;
      width: min(390px, calc(100vw - 36px));
      padding: 9px 12px 10px;
      border: 1px solid rgba(53, 84, 98, 0.25);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(36, 69, 84, 0.2);
      backdrop-filter: blur(8px);
    }

    .date {
      font-size: clamp(15px, 1.85vw, 22px);
      font-weight: 800;
      line-height: 1.05;
    }

    .airport {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .items {
      margin-top: 5px;
      font-size: clamp(13px, 1.55vw, 16px);
      line-height: 1.28;
      overflow-wrap: anywhere;
    }

    .transport {
      margin-top: 6px;
      padding: 6px 9px;
      border-radius: 8px;
      background: rgba(49, 209, 88, 0.13);
      color: #1f5d39;
      font-size: clamp(12px, 1.45vw, 15px);
      font-weight: 800;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .route-line {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 4;
      max-width: min(680px, calc(100vw - 36px));
      padding: 10px 12px;
      border: 1px solid rgba(53, 84, 98, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      color: #244554;
      font-size: 13px;
      line-height: 1.45;
      box-shadow: 0 8px 18px rgba(36, 69, 84, 0.16);
      backdrop-filter: blur(8px);
      display: none;
    }

    .skyteam-panel {
      position: absolute;
      left: 18px;
      bottom: 86px;
      z-index: 5;
      width: min(440px, calc(100vw - 36px));
      padding: 8px 10px 9px;
      border: 1px solid rgba(53, 84, 98, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 30px rgba(36, 69, 84, 0.2);
      backdrop-filter: blur(8px);
    }

    .skyteam-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
      color: #244554;
      font-size: 13px;
      font-weight: 850;
    }

    .skyteam-count {
      min-width: 58px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(49, 209, 88, 0.17);
      color: #1f5d39;
      text-align: center;
      font-variant-numeric: tabular-nums;
      animation: countPulse 1.2s ease-in-out infinite;
    }

    @keyframes countPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }

    .skyteam-board {
      position: relative;
      width: 100%;
      aspect-ratio: 1645 / 499;
      overflow: hidden;
      image-rendering: auto;
    }

    .skyteam-board img {
      position: absolute;
      user-select: none;
      pointer-events: none;
    }

    .skyteam-base {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .skyteam-logo {
      opacity: 0;
      transition: opacity 0.45s ease, filter 0.45s ease;
      filter: saturate(1.08);
      border-radius: 5px;
    }

    .skyteam-logo.complete {
      opacity: 1;
    }

    .skyteam-logo.highlight {
      outline: 3px solid #31d158;
      outline-offset: 4px;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.86), 0 0 20px rgba(49, 209, 88, 0.8);
    }

    .skyteam-logo.blink {
      opacity: 1;
      animation: logoBlink 0.28s ease-in-out 3;
    }

    .skyteam-fly-logo {
      position: fixed;
      z-index: 9;
      pointer-events: none;
      opacity: 0.96;
      filter: drop-shadow(0 8px 10px rgba(18, 45, 56, 0.28));
      transform-origin: center;
    }

    @keyframes logoBlink {
      0%, 100% { filter: brightness(1) saturate(1.08); transform: scale(1); }
      50% { filter: brightness(1.28) saturate(1.22); transform: scale(1.12); }
    }

    .controls {
      position: absolute;
      left: 50%;
      bottom: 18px;
      z-index: 6;
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      gap: 10px;
      align-items: center;
      width: min(760px, calc(100vw - 36px));
      padding: 10px 12px;
      border: 1px solid rgba(53, 84, 98, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 22px rgba(36, 69, 84, 0.18);
      transform: translateX(-50%);
      backdrop-filter: blur(8px);
    }

    .control-button {
      min-width: 72px;
      height: 34px;
      border: 1px solid rgba(31, 93, 57, 0.28);
      border-radius: 8px;
      background: rgba(49, 209, 88, 0.16);
      color: #1f5d39;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .control-button:active {
      transform: translateY(1px);
    }

    .progress {
      width: 100%;
      accent-color: #31d158;
      cursor: pointer;
    }

    .progress-label {
      min-width: 44px;
      color: #244554;
      font-size: 13px;
      font-weight: 800;
      text-align: right;
    }

    @media (max-width: 720px) {
      .info-card {
        top: 10px;
        right: 10px;
        width: calc(100vw - 20px);
        padding: 8px 10px;
      }

      .route-line {
        left: 10px;
        top: auto;
        bottom: 76px;
        max-width: calc(100vw - 20px);
        font-size: 12px;
      }

      .skyteam-panel {
        left: 10px;
        bottom: 76px;
        width: min(360px, calc(100vw - 20px));
        padding: 7px 8px 8px;
      }

      .skyteam-head {
        margin-bottom: 7px;
        font-size: 13px;
      }

      .controls {
        bottom: 10px;
        grid-template-columns: auto auto 1fr auto;
        gap: 7px;
        width: calc(100vw - 20px);
      }

      .control-button {
        min-width: 58px;
        padding-inline: 8px;
      }

      .city-label {
        font-size: 36px;
      }
    }
  </style>
</head>

  <main class="stage">
    <aside class="info-card" aria-live="polite">
      <div class="date" id="dateText">--</div>
      <div class="airport" id="airportText">--</div>
      <div class="items" id="itemsText">--</div>
      <div class="transport" id="transportText">--</div>
    </aside>

    <div class="route-line" id="routeLine"></div>

    <section class="skyteam-panel" aria-label="SkyTeam progress">
      <div class="skyteam-head">
        <span>SkyTeam Mission</span>
        <span class="skyteam-count" id="skyteamCount">0/15</span>
      </div>
      <div class="skyteam-board" id="skyteamBoard">
        <img class="skyteam-base" src="skyteam_logo_assets/skyteam_full_gray.png" alt="" />
      </div>
    </section>

    <div class="controls" aria-label="animation controls">
      <button class="control-button" id="playPauseButton" type="button">暂停</button>
      <button class="control-button" id="restartButton" type="button">重启</button>
      <input class="progress" id="progressInput" type="range" min="0" max="1000" value="0" aria-label="overall progress" />
      <div class="progress-label" id="progressLabel">0%</div>
    </div>

    <svg id="map" viewBox="0 0 3626 2254" preserveAspectRatio="xMidYMid slice" aria-label="SAS flight route map">
      <rect class="ocean-bg" x="0" y="0" width="3626" height="2254"></rect>
      <g id="countryLayer" class="country-layer"></g>
      <path id="planePath" class="plane-path"></path>
      <g id="routeLayer"></g>
      <g id="markerLayer"></g>
      <g id="planeLayer"></g>
    </svg>
  </main>

    const FULL_VIEWBOX = "0 0 3626 2254";
    const MAP_WIDTH = 3626;
    const MAP_HEIGHT = 2254;
    const MOBILE_FOLLOW_HEIGHT = 1180;
    const PLANE_ROTATION_OFFSET = 90;
    const ZOOM_REGIONS = [
      { name: "Europe", x: 1500, y: 280, width: 945, height: 530 },
      { name: "Asia and Southeast Asia", x: 2515, y: 502.8, width: 850, height: 815.3 }
    ];
    const BASE_MARKER = {
      ring: 15,
      dot: 6,
      ringStroke: 3,
      activeStroke: 6,
      dotStroke: 3,
      label: 31,
      labelStroke: 6
    };
    const BASE_PLANE = 104;
    const BASE_PLANE_LABEL = {
      font: 24,
      padX: 10,
      padY: 7
    };
    const SKYTEAM_BOARD_SIZE = { width: 1645, height: 499 };
    const SKYTEAM_TOTAL = 15;
    const SKYTEAM_LOGOS = [
      { code: "UX", name: "Air Europa", file: "03_air_europa.png", x: 503, y: 195, width: 171, height: 46 },
      { code: "AF", name: "Air France", file: "04_air_france.png", x: 706, y: 195, width: 171, height: 46 },
      { code: "CI", name: "China Airlines", file: "05_china_airlines.png", x: 909, y: 195, width: 171, height: 46 },
      { code: "MU", name: "China Eastern", file: "06_china_eastern.png", x: 1112, y: 195, width: 171, height: 46 },
      { code: "DL", name: "Delta Air Lines", file: "07_delta_air_lines.png", x: 1315, y: 195, width: 171, height: 46 },
      { code: "GA", name: "Garuda Indonesia", file: "08_garuda_indonesia.png", x: 97, y: 296, width: 171, height: 47 },
      { code: "KQ", name: "Kenya Airways", file: "09_kenya_airways.png", x: 300, y: 296, width: 171, height: 47 },
      { code: "KL", name: "KLM", file: "10_klm.png", x: 503, y: 296, width: 171, height: 47 },
      { code: "KE", name: "Korean Air", file: "11_korean_air.png", x: 706, y: 296, width: 171, height: 47 },
      { code: "SK", name: "SAS", file: "13_sas.png", x: 1112, y: 296, width: 171, height: 47 },
      { code: "SV", name: "Saudia", file: "14_saudia.png", x: 1315, y: 296, width: 171, height: 47 },
      { code: "RO", name: "TAROM", file: "15_tarom.png", x: 402, y: 396, width: 171, height: 46 },
      { code: "VN", name: "Vietnam Airlines", file: "16_vietnam_airlines.png", x: 605, y: 396, width: 171, height: 46 },
      { code: "VS", name: "Virgin Atlantic", file: "17_virgin_atlantic.png", x: 808, y: 396, width: 171, height: 46 },
      { code: "MF", name: "XiamenAir", file: "18_xiamenair.png", x: 1011, y: 396, width: 171, height: 46 }
    ];
    const SKYTEAM_TASK_BY_FROM_INDEX = {
      0: "DL",
      1: "VS",
      2: "SK",
      3: "KL",
      4: "AF",
      6: "RO",
      7: "UX",
      8: "SV",
      10: "MF",
      11: "KE",
      13: "CI",
      14: "GA",
      16: "VN",
      17: "KQ",
      18: "MU"
    };

    const createEl = (name, attrs = {}) => {
      const el = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    };

    const projectPoint = (lon, lat) => ({
      x: (lon + 180) / 360 * MAP_WIDTH,
      y: (90 - lat) / 180 * MAP_HEIGHT
    });

    const getPosition = (stop) => {
      const coord = AIRPORT_COORDS[stop.airport_code];
      return projectPoint(coord.lon, coord.lat);
    };

    const curvedPath = (from, to) => {
      const a = getPosition(from);
      const b = getPosition(to);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const distance = Math.hypot(dx, dy);
      const lift = Math.min(160, Math.max(8, distance * (distance < 260 ? 0.025 : distance < 650 ? 0.045 : 0.105)));
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      const nx = -dy / (distance || 1);
      const ny = dx / (distance || 1);
      const bend = b.x >= a.x ? -1 : 1;
      const c1 = { x: mx + nx * lift * bend, y: my + ny * lift * bend };
      return `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
    };

    const pacificWrapParts = (from, to) => {
      const a = getPosition(from);
      const b = getPosition(to);
      const exit = { x: MAP_WIDTH + 120, y: Math.max(170, a.y - 120) };
      const entry = { x: -120, y: Math.max(170, b.y - 120) };
      const c1 = { x: (a.x + exit.x) / 2, y: Math.min(a.y, exit.y) - 150 };
      const c2 = { x: (entry.x + b.x) / 2, y: Math.min(entry.y, b.y) - 120 };
      return [
        `M ${a.x.toFixed(1)} ${a.y.toFixed(1)} Q ${c1.x.toFixed(1)} ${c1.y.toFixed(1)} ${exit.x.toFixed(1)} ${exit.y.toFixed(1)}`,
        `M ${entry.x.toFixed(1)} ${entry.y.toFixed(1)} Q ${c2.x.toFixed(1)} ${c2.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`
      ];
    };

    const legPathParts = (leg) => (
      leg.isPacificWrap ? pacificWrapParts(leg.from, leg.to) : [curvedPath(leg.from, leg.to)]
    );

    const isSamePlace = (from, to) => from.airport_code === to.airport_code;
    const isJumpLeg = (from, to) => from.airport_code === "WUX" && to.airport_code === "PVG";
    const routeLegs = STOPS.slice(0, -1).map((from, index) => ({
      from,
      to: STOPS[index + 1],
      fromIndex: index,
      toIndex: index + 1,
      isPacificWrap: from.airport_code === "PVG" && STOPS[index + 1].airport_code === "SEA",
      durationMs: from.airport_code === "PVG" && STOPS[index + 1].airport_code === "SEA"
        ? LEG_DURATION_MS * 3
        : LEG_DURATION_MS
    })).filter((leg) => !isSamePlace(leg.from, leg.to) && !isJumpLeg(leg.from, leg.to));

    const routeNodes = [];
    const markerNodes = {};
    const skyteamLogoNodes = {};
    const skyteamCompletedCodes = new Set();
    const skyteamAnimatingCodes = new Set();
    const skyteamAnimatedLegs = new Set();
    let planeMover = null;
    let planeImage = null;
    let planeLabelGroup = null;
    let planeLabelBg = null;
    let planeLabelText = null;
    let activeViewBox = FULL_VIEWBOX;
    let activeMarkerZoom = 1;
    let currentCycle = -1;
    let lastActiveStopIndex = -1;
    let lastActiveLegIndex = -1;

    const applyMarkerScale = (zoom = 1) => {
      activeMarkerZoom = zoom;
      Object.values(markerNodes).forEach((node) => {
        const ring = node.querySelector(".marker-ring");
        const dot = node.querySelector(".marker-dot");
        const label = node.querySelector(".city-label");
        const isActive = node.classList.contains("active");
        ring.setAttribute("r", (BASE_MARKER.ring / zoom).toFixed(2));
        ring.style.strokeWidth = `${((isActive ? BASE_MARKER.activeStroke : BASE_MARKER.ringStroke) / zoom).toFixed(2)}px`;
        dot.setAttribute("r", (BASE_MARKER.dot / zoom).toFixed(2));
        dot.style.strokeWidth = `${(BASE_MARKER.dotStroke / zoom).toFixed(2)}px`;
        label.style.fontSize = `${(BASE_MARKER.label / zoom).toFixed(2)}px`;
        label.style.strokeWidth = `${(BASE_MARKER.labelStroke / zoom).toFixed(2)}px`;
      });
    };

    const applyPlaneScale = (zoom = 1) => {
      if (!planeImage) return;
      const size = BASE_PLANE / zoom;
      planeImage.setAttribute("x", (-size / 2).toFixed(2));
      planeImage.setAttribute("y", (-size / 2).toFixed(2));
      planeImage.setAttribute("width", size.toFixed(2));
      planeImage.setAttribute("height", size.toFixed(2));
    };

    const updatePlaneLabel = (point, detail) => {
      if (!planeLabelGroup || !planeLabelText || !planeLabelBg) return;
      if (!detail) {
        planeLabelGroup.style.display = "none";
        return;
      }

      const zoom = activeMarkerZoom || 1;
      const offsetX = point.x > MAP_WIDTH - 520 ? -290 / zoom : 58 / zoom;
      const offsetY = -48 / zoom;
      planeLabelText.textContent = detail;
      planeLabelText.style.fontSize = `${(BASE_PLANE_LABEL.font / zoom).toFixed(2)}px`;
      planeLabelText.style.strokeWidth = `${(3.2 / zoom).toFixed(2)}px`;
      planeLabelGroup.setAttribute("transform", `translate(${(point.x + offsetX).toFixed(1)} ${(point.y + offsetY).toFixed(1)})`);
      planeLabelGroup.style.display = "block";

      requestAnimationFrame(() => {
        if (!planeLabelText || !planeLabelBg) return;
        const box = planeLabelText.getBBox();
        const padX = BASE_PLANE_LABEL.padX / zoom;
        const padY = BASE_PLANE_LABEL.padY / zoom;
        planeLabelBg.setAttribute("x", (box.x - padX).toFixed(2));
        planeLabelBg.setAttribute("y", (box.y - padY).toFixed(2));
        planeLabelBg.setAttribute("width", (box.width + padX * 2).toFixed(2));
        planeLabelBg.setAttribute("height", (box.height + padY * 2).toFixed(2));
        planeLabelBg.setAttribute("rx", (8 / zoom).toFixed(2));
        planeLabelBg.setAttribute("ry", (8 / zoom).toFixed(2));
        planeLabelBg.style.strokeWidth = `${(1.5 / zoom).toFixed(2)}px`;
      });
    };

    const updatePanel = (stopIndex, activeLegIndex = -1) => {
      if (stopIndex === lastActiveStopIndex && activeLegIndex === lastActiveLegIndex) return;
      lastActiveStopIndex = stopIndex;
      lastActiveLegIndex = activeLegIndex;
      const stop = STOPS[stopIndex] || STOPS[0];
      dateText.textContent = stop.date || "--";
      airportText.textContent = `${stop.sequence}  ${stop.airport_code}${stop.city ? ` · ${stop.city}` : ""}${CITY_CN[stop.airport_code] ? ` · ${CITY_CN[stop.airport_code]}` : ""}`;
      itemsText.textContent = stop.items || "";
      const detail = activeLegIndex >= 0 ? TRANSPORT_DETAILS[activeLegIndex] : "";
      transportText.textContent = detail || "--";
      Object.values(markerNodes).forEach((node) => node.classList.remove("active"));
      if (markerNodes[stop.airport_code]) markerNodes[stop.airport_code].classList.add("active");
      applyMarkerScale(activeMarkerZoom);
    };

    const resetRoutes = () => {
      routeNodes.flat().forEach((node) => node.classList.remove("flown", "active"));
      if (planeMover) planeMover.style.display = "none";
      if (planeLabelGroup) planeLabelGroup.style.display = "none";
      activeViewBox = FULL_VIEWBOX;
      mapSvg.setAttribute("viewBox", FULL_VIEWBOX);
      applyMarkerScale(1);
      applyPlaneScale(1);
      lastActiveStopIndex = -1;
      lastActiveLegIndex = -1;
      skyteamCompletedCodes.clear();
      skyteamAnimatingCodes.clear();
      skyteamAnimatedLegs.clear();
      document.querySelectorAll(".skyteam-fly-logo").forEach((node) => node.remove());
      updateSkyTeamDisplay();
      updatePanel(0, -1);
    };

    const flashAllMarkers = () => {
      Object.values(markerNodes).forEach((node) => node.classList.remove("intro-flash"));
      void markerLayer.getBoundingClientRect();
      Object.values(markerNodes).forEach((node) => node.classList.add("intro-flash"));
    };

    const beginIntroCycle = () => {
      resetRoutes();
      flashAllMarkers();
    };

    const drawSkyTeamLogos = () => {
      SKYTEAM_LOGOS.forEach((logo) => {
        const img = document.createElement("img");
        img.className = "skyteam-logo";
        img.src = `skyteam_logo_assets/${logo.file}`;
        img.alt = logo.name;
        img.style.left = `${logo.x / SKYTEAM_BOARD_SIZE.width * 100}%`;
        img.style.top = `${logo.y / SKYTEAM_BOARD_SIZE.height * 100}%`;
        img.style.width = `${logo.width / SKYTEAM_BOARD_SIZE.width * 100}%`;
        img.style.height = `${logo.height / SKYTEAM_BOARD_SIZE.height * 100}%`;
        skyteamBoard.appendChild(img);
        skyteamLogoNodes[logo.code] = img;
      });
    };

    const updateSkyTeamDisplay = () => {
      Object.entries(skyteamLogoNodes).forEach(([code, node]) => {
        node.classList.toggle("complete", skyteamCompletedCodes.has(code));
      });
      if (skyteamCount) {
        skyteamCount.textContent = `${Math.min(skyteamCompletedCodes.size, SKYTEAM_TOTAL)}/${SKYTEAM_TOTAL}`;
      }
    };

    const completeSkyTeamCode = (code, blink = false) => {
      if (!code || !skyteamLogoNodes[code]) return;
      skyteamCompletedCodes.add(code);
      updateSkyTeamDisplay();
      if (blink) {
        const node = skyteamLogoNodes[code];
        node.classList.remove("blink", "highlight");
        void node.offsetWidth;
        node.classList.add("blink", "highlight");
        window.setTimeout(() => node.classList.remove("blink"), 900);
      }
    };

    const syncSkyTeamProgress = (activeLegIndex = -1, includeActive = false) => {
      routeLegs.forEach((leg, index) => {
        if (index > activeLegIndex || (!includeActive && index === activeLegIndex)) return;
        completeSkyTeamCode(SKYTEAM_TASK_BY_FROM_INDEX[leg.fromIndex], false);
      });
      updateSkyTeamDisplay();
    };

    const svgPointToClient = (point) => {
      const svgPoint = mapSvg.createSVGPoint();
      svgPoint.x = point.x;
      svgPoint.y = point.y;
      const matrix = mapSvg.getScreenCTM();
      if (!matrix) return { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      const clientPoint = svgPoint.matrixTransform(matrix);
      return { x: clientPoint.x, y: clientPoint.y };
    };

    const flySkyTeamLogo = (code, point, legIndex, durationMs) => {
      const target = skyteamLogoNodes[code];
      if (!target || skyteamCompletedCodes.has(code) || skyteamAnimatingCodes.has(code) || skyteamAnimatedLegs.has(legIndex)) return;
      const targetBox = target.getBoundingClientRect();
      if (!targetBox.width || !targetBox.height) {
        completeSkyTeamCode(code, true);
        return;
      }

      skyteamAnimatingCodes.add(code);
      skyteamAnimatedLegs.add(legIndex);
      const start = svgPointToClient(point);
      const width = Math.max(54, targetBox.width * 1.15);
      const height = Math.max(22, targetBox.height * 1.15);
      const endX = targetBox.left + targetBox.width / 2 - width / 2;
      const endY = targetBox.top + targetBox.height / 2 - height / 2;
      const startX = start.x + 18;
      const startY = start.y - height - 12;
      const flyer = document.createElement("img");
      flyer.className = "skyteam-fly-logo";
      flyer.src = target.src;
      flyer.alt = "";
      flyer.style.left = `${startX}px`;
      flyer.style.top = `${startY}px`;
      flyer.style.width = `${width}px`;
      flyer.style.height = `${height}px`;
      document.body.appendChild(flyer);

      const animation = flyer.animate([
        { transform: "translate(0, 0) scale(0.82)", opacity: 0.1 },
        { transform: `translate(${(endX - startX) * 0.45}px, ${(endY - startY) * 0.45 - 36}px) scale(1.08)`, opacity: 1, offset: 0.48 },
        { transform: `translate(${endX - startX}px, ${endY - startY}px) scale(1)`, opacity: 1 }
      ], {
        duration: Math.max(900, durationMs),
        easing: "cubic-bezier(0.2, 0.75, 0.25, 1)",
        fill: "forwards"
      });

      animation.onfinish = () => {
        flyer.remove();
        skyteamAnimatingCodes.delete(code);
        completeSkyTeamCode(code, true);
      };
      animation.oncancel = () => {
        flyer.remove();
        skyteamAnimatingCodes.delete(code);
      };
    };

    const fitViewBoxToViewport = (box) => {
      if (!box) return null;
      const viewportRatio = window.innerWidth / Math.max(1, window.innerHeight);
      let { x, y, width, height } = box;
      const boxRatio = width / height;

      if (boxRatio < viewportRatio) {
        const nextWidth = height * viewportRatio;
        x -= (nextWidth - width) / 2;
        width = nextWidth;
      } else if (boxRatio > viewportRatio) {
        const nextHeight = width / viewportRatio;
        y -= (nextHeight - height) / 2;
        height = nextHeight;
      }

      if (width > MAP_WIDTH) {
        width = MAP_WIDTH;
        x = 0;
      } else {
        x = Math.max(0, Math.min(MAP_WIDTH - width, x));
      }

      if (height > MAP_HEIGHT) {
        height = MAP_HEIGHT;
        y = 0;
      } else {
        y = Math.max(0, Math.min(MAP_HEIGHT - height, y));
      }

      return { x, y, width, height };
    };

    const updateMapView = (point) => {
      const isPortraitPhone = window.matchMedia("(max-width: 720px) and (orientation: portrait)").matches;
      let box = ZOOM_REGIONS.find((region) => (
        point.x >= region.x &&
        point.x <= region.x + region.width &&
        point.y >= region.y &&
        point.y <= region.y + region.height
      ));

      if (!box && isPortraitPhone) {
        const ratio = window.innerWidth / Math.max(1, window.innerHeight);
        const height = MOBILE_FOLLOW_HEIGHT;
        const width = height * ratio;
        box = {
          x: Math.max(0, Math.min(MAP_WIDTH - width, point.x - width / 2)),
          y: Math.max(0, Math.min(MAP_HEIGHT - height, point.y - height / 2)),
          width,
          height
        };
      }

      box = fitViewBoxToViewport(box);
      const nextViewBox = box
        ? `${box.x.toFixed(1)} ${box.y.toFixed(1)} ${box.width.toFixed(1)} ${box.height.toFixed(1)}`
        : FULL_VIEWBOX;
      const zoom = box ? Math.max(1, MAP_WIDTH / box.width) : 1;
      if (nextViewBox === activeViewBox) return;
      activeViewBox = nextViewBox;
      mapSvg.setAttribute("viewBox", activeViewBox);
      applyMarkerScale(zoom);
      applyPlaneScale(zoom);
    };

    const drawVectorMap = () => {
      COUNTRY_PATHS.forEach((d) => {
        countryLayer.appendChild(createEl("path", { class: "country", d }));
      });
    };

    const drawRoutes = () => {
      routeLegs.forEach((leg, index) => {
        const nodes = legPathParts(leg).map((d, partIndex) => {
          const path = createEl("path", {
            class: "route",
            d,
            "data-leg-index": index,
            "data-part-index": partIndex,
            "data-from-index": leg.fromIndex,
            "data-to-index": leg.toIndex
          });
          routeLayer.appendChild(path);
          return path;
        });
        routeNodes.push(nodes);
      });
    };

    const drawMarkers = () => {
      const seen = new Set();
      STOPS.forEach((stop) => {
        if (seen.has(stop.airport_code)) return;
        seen.add(stop.airport_code);

        const p = getPosition(stop);
        const rawOffset = LABEL_OFFSETS[stop.airport_code] || { x: 24, y: -18 };
        const offset = { x: rawOffset.x * 0.58, y: rawOffset.y * 0.58 };
        const g = createEl("g", { class: "marker", "data-code": stop.airport_code });
        const ring = createEl("circle", { class: "marker-ring", cx: p.x, cy: p.y, r: 20 });
        const dot = createEl("circle", { class: "marker-dot", cx: p.x, cy: p.y, r: 8 });
        const label = createEl("text", { class: "city-label", x: p.x + offset.x, y: p.y + offset.y });
        label.textContent = `${stop.airport_code}${CITY_CN[stop.airport_code] ? ` ${CITY_CN[stop.airport_code]}` : ""}`;

        g.appendChild(ring);
        g.appendChild(dot);
        g.appendChild(label);
        markerLayer.appendChild(g);
        markerNodes[stop.airport_code] = g;
      });
      applyMarkerScale(activeMarkerZoom);
    };

    const drawPlane = () => {
      const fullPath = routeLegs.flatMap((leg) => legPathParts(leg)).join(" ");
      planePath.setAttribute("d", fullPath);

      planeMover = createEl("g");
      planeImage = createEl("image", {
        href: "pic/air-plane-transparent.png",
        x: -52,
        y: -52,
        width: 104,
        height: 104,
        class: "plane"
      });
      planeMover.appendChild(planeImage);
      planeLayer.appendChild(planeMover);
      planeMover.style.display = "none";

      planeLabelGroup = createEl("g", { class: "plane-label" });
      planeLabelBg = createEl("rect", {
        class: "plane-label-bg",
        x: -10,
        y: -31,
        width: 1,
        height: 1,
        rx: 8,
        ry: 8
      });
      planeLabelText = createEl("text", {
        class: "plane-label-text",
        x: 0,
        y: -7
      });
      planeLabelGroup.appendChild(planeLabelBg);
      planeLabelGroup.appendChild(planeLabelText);
      planeLayer.appendChild(planeLabelGroup);
      planeLabelGroup.style.display = "none";
    };

    const updateRoutesForLeg = (activeLegIndex) => {
      routeNodes.forEach((nodes, index) => {
        nodes.forEach((node) => {
          node.classList.toggle("flown", index < activeLegIndex);
          node.classList.toggle("active", index === activeLegIndex);
        });
      });
    };

    const legStartTimes = routeLegs.reduce((starts, leg) => {
      starts.push((starts[starts.length - 1] || 0) + (routeLegs[starts.length - 1]?.durationMs || 0));
      return starts;
    }, []);
    const flightDuration = routeLegs.reduce((sum, leg) => sum + leg.durationMs, 0);
    const cycleDuration = INTRO_FLASH_MS + flightDuration;
    let elapsedMs = 0;
    let lastFrameTime = 0;
    let isPlaying = true;
    let isDraggingProgress = false;
    let hasCompleted = false;

    const getPointOnLeg = (legIndex, progress) => {
      const nodes = routeNodes[legIndex];
      const lengths = nodes.map((node) => node.getTotalLength());
      const totalLength = lengths.reduce((sum, length) => sum + length, 0);
      let distance = totalLength * progress;
      let node = nodes[nodes.length - 1];
      let localDistance = lengths[lengths.length - 1];

      for (let i = 0; i < nodes.length; i += 1) {
        if (distance <= lengths[i] || i === nodes.length - 1) {
          node = nodes[i];
          localDistance = Math.max(0, Math.min(lengths[i], distance));
          break;
        }
        distance -= lengths[i];
      }

      const pathLength = node.getTotalLength();
      const p = node.getPointAtLength(localDistance);
      const before = node.getPointAtLength(Math.max(0, localDistance - 2));
      const after = node.getPointAtLength(Math.min(pathLength, localDistance + 2));
      const angle = Math.atan2(after.y - before.y, after.x - before.x) * 180 / Math.PI;
      return { p, angle };
    };

    const updateProgressUi = (elapsed) => {
      if (!isDraggingProgress) {
        progressInput.value = Math.round((elapsed / cycleDuration) * Number(progressInput.max));
      }
      progressLabel.textContent = `${Math.round((elapsed / cycleDuration) * 100)}%`;
    };

    const renderFinalState = () => {
      const finalStopIndex = STOPS.length - 1;
      const { p: finalPoint, angle } = getPointOnLeg(routeLegs.length - 1, 1);
      updateProgressUi(cycleDuration);
      updateRoutesForLeg(routeLegs.length);
      syncSkyTeamProgress(routeLegs.length - 1, true);
      updateMapView(finalPoint);
      updatePanel(finalStopIndex, routeLegs.length - 1);
      updatePlaneLabel(finalPoint, TRANSPORT_DETAILS[routeLegs.length - 1] || "");
      if (planeMover) {
        planeMover.style.display = "block";
        planeMover.setAttribute("transform", `translate(${finalPoint.x.toFixed(1)} ${finalPoint.y.toFixed(1)}) rotate(${(angle + PLANE_ROTATION_OFFSET).toFixed(1)})`);
      }
    };

    const renderAtElapsed = (elapsed) => {
      updateProgressUi(elapsed);

      if (elapsed < INTRO_FLASH_MS) {
        resetRoutes();
        return;
      }

      const flightElapsed = elapsed - INTRO_FLASH_MS;
      if (flightElapsed >= flightDuration) {
        renderFinalState();
        return;
      }

      const flightIndex = Math.max(0, routeLegs.findIndex((leg, index) => (
        flightElapsed >= legStartTimes[index] &&
        flightElapsed < legStartTimes[index] + leg.durationMs
      )));
      const leg = routeLegs[flightIndex];
      const localProgress = (flightElapsed - legStartTimes[flightIndex]) / leg.durationMs;
      const { p, angle } = getPointOnLeg(flightIndex, localProgress);
      const activeIndex = localProgress < 0.5 ? leg.fromIndex : leg.toIndex;

      if (planeMover) {
        planeMover.style.display = "block";
        planeMover.setAttribute("transform", `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)}) rotate(${(angle + PLANE_ROTATION_OFFSET).toFixed(1)})`);
      }

      updateMapView(p);
      updatePanel(activeIndex, flightIndex);
      updatePlaneLabel(p, TRANSPORT_DETAILS[flightIndex] || "");
      updateRoutesForLeg(flightIndex);
      syncSkyTeamProgress(flightIndex, false);
      const skyteamCode = SKYTEAM_TASK_BY_FROM_INDEX[leg.fromIndex];
      if (skyteamCode && localProgress < 0.18 && isPlaying && !isDraggingProgress && !hasCompleted) {
        flySkyTeamLogo(skyteamCode, p, flightIndex, leg.durationMs);
      } else if (skyteamCode && (isDraggingProgress || !isPlaying) && localProgress > 0.18) {
        completeSkyTeamCode(skyteamCode, false);
      } else if (skyteamCode && localProgress >= 0.18 && !skyteamCompletedCodes.has(skyteamCode) && !skyteamAnimatingCodes.has(skyteamCode)) {
        completeSkyTeamCode(skyteamCode, false);
      }
    };

    const updateByTime = (timestamp) => {
      if (!lastFrameTime) lastFrameTime = timestamp;
      const delta = timestamp - lastFrameTime;
      lastFrameTime = timestamp;

      if (isPlaying && !isDraggingProgress) {
        elapsedMs += delta;
        if (elapsedMs >= cycleDuration) {
          elapsedMs = cycleDuration;
          isPlaying = false;
          hasCompleted = true;
          playPauseButton.textContent = "继续";
        }
        renderAtElapsed(elapsedMs);
      }

      requestAnimationFrame(updateByTime);
    };

    playPauseButton.addEventListener("click", () => {
      if (hasCompleted) return;
      isPlaying = !isPlaying;
      playPauseButton.textContent = isPlaying ? "暂停" : "继续";
      lastFrameTime = performance.now();
    });

    restartButton.addEventListener("click", () => {
      elapsedMs = 0;
      currentCycle += 1;
      isPlaying = true;
      hasCompleted = false;
      playPauseButton.textContent = "暂停";
      beginIntroCycle();
      renderAtElapsed(elapsedMs);
      lastFrameTime = performance.now();
    });

    progressInput.addEventListener("input", () => {
      isDraggingProgress = true;
      elapsedMs = (Number(progressInput.value) / Number(progressInput.max)) * cycleDuration;
      hasCompleted = elapsedMs >= cycleDuration;
      renderAtElapsed(elapsedMs);
    });

    progressInput.addEventListener("change", () => {
      isDraggingProgress = false;
      lastFrameTime = performance.now();
    });

    routeLine.textContent = STOPS.map((stop) => stop.airport_code).join(" -> ");
    drawVectorMap();
    drawSkyTeamLogos();
    drawRoutes();
    drawMarkers();
    drawPlane();
    beginIntroCycle();
    requestAnimationFrame(() => updateByTime(performance.now()));
  </script>
</body>
</html>
